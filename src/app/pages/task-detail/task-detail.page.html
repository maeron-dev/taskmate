<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <!-- Importante: defaultHref para que el botón funcione siempre -->
      <ion-back-button defaultHref="/tabs/tab2"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle de Tarea</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="deleteTask()" color="danger">
        <ion-icon name="trash" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (task) {
    <!-- Uso de Pipe Uppercase -->
    <ion-badge [color]="task.priority === 'alta' ? 'danger' : (task.priority === 'media' ? 'warning' : 'success')">
      {{ task.priority | uppercase }}
    </ion-badge>

    <h1 class="ion-margin-top">{{ task.title }}</h1>
    <p class="ion-text-justify">{{ task.description || 'Sin descripción' }}</p>
    
    <!-- Uso de Pipe Date -->
    <ion-note color="medium">
      Creada el {{ task.createdAt | date:'dd/MM/yyyy HH:mm' }}
    </ion-note>

    <ion-button expand="block" class="ion-margin-top"
      [color]="task.completed ? 'medium' : 'success'"
      (click)="toggleComplete()">
      <ion-icon [name]="task.completed ? 'refresh' : 'checkmark'" slot="start"></ion-icon>
      {{ task.completed ? 'Marcar como pendiente' : 'Marcar como completada' }}
    </ion-button>
  } @else {
    <div class="ion-text-center">
      <p>No se encontró la tarea.</p>
    </div>
  }
</ion-content>
