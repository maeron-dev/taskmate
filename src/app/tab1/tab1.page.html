<ion-header>
  <ion-toolbar color="primary">
    <ion-title>TaskMate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="welcome-section">
    <h2>¡Hola, Developer! 👋</h2>
    <!-- Usamos stats.pending para mostrar el número real -->
    <p>Tienes <strong>{{ stats.pending }} tareas</strong> pendientes hoy.</p>
  </div>

  <!-- Tarjeta de Resumen -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Resumen del día</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col class="stat-col" style="text-align: center;">
            <div class="stat-number" style="font-size: 1.5rem; font-weight: bold;">{{ stats.pending }}</div>
            <div class="stat-label">Pendientes</div>
          </ion-col>
          <ion-col class="stat-col" style="text-align: center;">
            <div class="stat-number" style="font-size: 1.5rem; font-weight: bold;">{{ stats.completed }}</div>
            <div class="stat-label">Completadas</div>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

  <!-- LISTA DE TAREAS REALES -->
  <h3 class="ion-margin-start">Mis Tareas</h3>
  <ion-list lines="none">
    <ion-item *ngFor="let task of tasks" class="ion-margin-bottom" style="--border-radius: 10px; border: 1px solid #eee;">
      <ion-label>
        <h2>{{ task.title }}</h2>
        <p>{{ task.description }}</p>
      </ion-label>
      
      <!-- Color del badge según prioridad -->
      <ion-badge slot="end" [color]="task.priority === 'alta' ? 'danger' : (task.priority === 'media' ? 'warning' : 'success')">
        {{ task.priority }}
      </ion-badge>
    </ion-item>
  </ion-list>

  <!-- Botones de añadir -->
  <ion-button expand="block" color="primary" class="ion-margin-top">
    <ion-icon name="add" slot="start"></ion-icon>
    Nueva Tarea
  </ion-button>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
