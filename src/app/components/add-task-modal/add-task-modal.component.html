<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Nueva Tarea</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Título *</ion-label>
    <ion-input [(ngModel)]="title" placeholder="¿Qué hay que hacer?" type="text"></ion-input>
  </ion-item>

  <ion-item class="ion-margin-top">
    <ion-label position="stacked">Descripción</ion-label>
    <ion-textarea [(ngModel)]="description" rows="3" placeholder="Detalles opcionales..."></ion-textarea>
  </ion-item>

  <ion-item class="ion-margin-top">
    <ion-label>Prioridad</ion-label>
    <ion-select [(ngModel)]="priority" interface="action-sheet">
      <ion-select-option value="alta">🔴 Alta</ion-select-option>
      <ion-select-option value="media">🟡 Media</ion-select-option>
      <ion-select-option value="baja">🟢 Baja</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" (click)="save()" [disabled]="!title.trim()">
    Guardar Tarea
  </ion-button>
</ion-content>
