<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Mis Tareas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Pull-to-refresh añadido (Criterio de Aceptación T03) -->
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content pullingText="Arrastra para actualizar..." refreshingSpinner="crescent"></ion-refresher-content>
  </ion-refresher>

  <!-- Barra de búsqueda original -->
  <ion-searchbar placeholder="Buscar tarea..." (ionInput)="filterTasks($event)"></ion-searchbar>

  <!-- Filtros originales -->
  <ion-segment [(ngModel)]="selectedFilter" (ionChange)="applyFilter()">
    <ion-segment-button value="all"><ion-label>Todas</ion-label></ion-segment-button>
    <ion-segment-button value="pending"><ion-label>Pendientes</ion-label></ion-segment-button>
    <ion-segment-button value="done"><ion-label>Hechas</ion-label></ion-segment-button>
  </ion-segment>

  <ion-list>
    <!-- Usamos @for con track por ID como pide el criterio de aceptación -->
    @for (task of filteredTasks; track task.id) {
      <ion-item button>
        <!-- Checkbox funcional -->
        <ion-checkbox slot="start" [(ngModel)]="task.completed" (ngModelChange)="onToggle(task)"></ion-checkbox>
        
        <ion-label (click)="goToDetail(task.id)">
          <h2 [style.text-decoration]="task.completed ? 'line-through' : 'none'">{{ task.title }}</h2>
          <p>{{ task.description }}</p>
        </ion-label>

        <!-- Badge con color según prioridad -->
        <ion-badge slot="end" [color]="task.priority === 'alta' ? 'danger' : (task.priority === 'media' ? 'warning' : 'success')">
          {{ task.priority }}
        </ion-badge>
      </ion-item>
    } @empty {
      <div class="ion-text-center ion-padding">
        <ion-icon name="clipboard-outline" size="large" color="medium"></ion-icon>
        <h3>No hay tareas</h3>
        <p>Crea tu primera tarea con el botón +</p>
      </div>
    }
  </ion-list>

<!-- Busca tu ion-fab al final del archivo y añade el (click) -->
<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button color="primary" (click)="openAddModal()"> <!-- Añadido (click) -->
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>

</ion-content>
